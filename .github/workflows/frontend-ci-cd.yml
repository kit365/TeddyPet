name: Frontend CI (Vite)
# Triggering final deploy test with Env Var Fix

on:
  push:
    branches: [ "main", "staging" ]
    paths:
      - "TeddyPet_FE/**"
      - ".github/workflows/frontend-ci-cd.yml"
  pull_request:
    branches: [ "main", "staging" ]
    paths:
      - "TeddyPet_FE/**"
      - ".github/workflows/frontend-ci-cd.yml"

env:
  WORKING_DIRECTORY: TeddyPet_FE

jobs:
  build:
    name: 🏗️ Build frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Lint check
        run: npm run lint
        working-directory: ${{ env.WORKING_DIRECTORY }}
        continue-on-error: true

      - name: Build project
        run: npm run build
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: 🔔 Discord Notification (Failure)
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          content: "❌ **Frontend Build Failed!** Kiểm tra ngay đi bồ ơi!"
          title: "TeddyPet FE - Build Error"

  docker-build-push:
    name: 🐳 Docker Build & Push
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/teddypet-fe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ env.WORKING_DIRECTORY }}
          file: ./${{ env.WORKING_DIRECTORY }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ startsWith(github.ref, 'refs/tags/v') && format('{0}:{1}', env.IMAGE_NAME, github.ref_name) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: 🚀 Deploy to VPS
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Sync Config & Deploy to VPS (Raw SSH)
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          
          # Sync configuration files
          scp -i ~/.ssh/deploy_key docker-compose.prod.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_PATH }}/
          scp -r -i ~/.ssh/deploy_key infrastructure/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_PATH }}/

          # Deploy services
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=10 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
          EOF

      - name: 🔔 Discord Notification (Success)
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          content: "🎨 **Frontend Deployed Successfully!** Giao diện mới đã lên kệ."
          title: "TeddyPet FE - Deployment Success"

      - name: 🔔 Discord Notification (Failure)
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          content: "🚨 **Frontend Deployment Failed!** VPS không chịu thay quần áo mới!"
          title: "TeddyPet FE - Deployment Error"
