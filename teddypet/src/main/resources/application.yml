spring:
  application:
    name: teddypet
    url: ${SPRING_BACKEND_URL}
  profiles:
    active: dev
  jwt:
    key-secret: ${SPRING_JWT_SECRET_KEY}
    key-expiration-ms: ${SPRING_JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${SPRING_JWT_REFRESH_EXPIRATION_MS:604800000}

server:
  port: ${SERVER_PORT}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
