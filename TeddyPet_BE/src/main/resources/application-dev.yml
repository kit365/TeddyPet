spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: false
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
          batch_size: 50
        order_inserts: true
        order_updates: true
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    out-of-order: true
  
  data:
    mongodb:
      # MongoDB không auth (local). Restart backend sau khi sửa. Nếu vẫn lỗi "Authentication failed": xóa biến môi trường SPRING_DATA_MONGODB_URI hoặc set = mongodb://localhost:27017/teddypet
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/teddypet}
    
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
  

  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    connection-timeout: ${ELASTICSEARCH_CONNECTION_TIMEOUT:5s}
    socket-timeout: ${ELASTICSEARCH_SOCKET_TIMEOUT:60s}

  mail:
    properties:
      mail:
        debug: false

# Logging configuration
logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.springframework.security: DEBUG
