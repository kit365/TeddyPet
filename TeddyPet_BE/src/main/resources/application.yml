server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: teddypet
  profiles:
    active: dev
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        debug: ${SPRING_MAIL_DEBUG:false}
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# Custom Properties (Nằm ngoài spring)
jwt:
  key-secret: ${JWT_SECRET_KEY:teddypetsecretkeyteddypetsecretkeyteddypetsecretkey}
  key-expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

payment:
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:}
    hash-secret: ${VNPAY_HASH_SECRET:}
    url: ${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    return-url: "${SPRING_BACKEND_URL:http://localhost:8080}/api/v1/payment/vnpay-return"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# App configuration
app:
  name: TeddyPet
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  password-reset:
    token-expiration-minutes: ${APP_PASSWORD_RESET_TOKEN_EXPIRATION:15}