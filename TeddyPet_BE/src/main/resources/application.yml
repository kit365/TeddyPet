server:
  port: ${SERVER_PORT:8080}

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: teddypet
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    from: ${SPRING_MAIL_FROM:noreply@teddypet.id.vn}
    display-name: ${SPRING_MAIL_DISPLAY_NAME:TeddyPet Support}
    default-encoding: UTF-8
    properties:
      mail:
        debug: ${SPRING_MAIL_DEBUG:false}
        smtp:
          auth: true
          ssl:
            enable: ${SPRING_MAIL_SSL_ENABLE:true}
          starttls:
            enable: ${SPRING_MAIL_STARTTLS_ENABLE:false}
          socketFactory:
            port: ${SPRING_MAIL_PORT:587}
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
        connectiontimeout: 10000
        timeout: 10000
        writetimeout: 10000

# Custom Properties (Nằm ngoài spring)
jwt:
  key-secret: ${JWT_SECRET_KEY:teddypetsecretkeyteddypetsecretkeyteddypetsecretkey}
  key-expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

payment:
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:}
    hash-secret: ${VNPAY_HASH_SECRET:}
    url: ${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    return-url: "${SPRING_BACKEND_URL:https://teddypet-be.onrender.com}/api/v1/payment/vnpay-return"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# App configuration
app:
  name: TeddyPet
  frontend-url: ${APP_FRONTEND_URL:https://teddypet-dusky.vercel.app}
  password-reset:
    token-expiration-minutes: ${APP_PASSWORD_RESET_TOKEN_EXPIRATION:15}
  slot:
    duration-minutes: ${APP_SLOT_DURATION_MINUTES:30}
    generate-days-ahead: ${APP_SLOT_GENERATE_DAYS_AHEAD:60}