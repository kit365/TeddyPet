server:
  port: ${SERVER_PORT:8080}

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: teddypet
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    time-zone: Asia/Ho_Chi_Minh
    serialization:
      write-dates-as-timestamps: false
  flyway:
    # DB local lệch checksum: profile dev (repair-on-migrate), hoặc prod+local, hoặc SPRING_FLYWAY_REPAIR_ON_MIGRATE=true
    repair-on-migrate: ${SPRING_FLYWAY_REPAIR_ON_MIGRATE:false}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:422567263716-9j7coeuir10hurql2akp21c3dpmtki0q.apps.googleusercontent.com}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI}
            scope:
              - email
              - profile
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

resend:
  from: ${RESEND_FROM:noreply@teddypet.id.vn}
  display-name: ${RESEND_DISPLAY_NAME:TeddyPet Support}
  api-key: ${RESEND_API_KEY:}
  api-url: https://api.resend.com/emails

# Custom Properties (Nằm ngoài spring)
jwt:
  key-secret: ${JWT_SECRET_KEY:teddypetsecretkeyteddypetsecretkeyteddypetsecretkey}
  key-expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

payment:
  payos:
    client-id: ${PAYOS_CLIENT_ID:}
    api-key: ${PAYOS_API_KEY:}
    checksum-key: ${PAYOS_CHECKSUM_KEY:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# App configuration
app:
  name: TeddyPet
  google:
    client-id: ${GOOGLE_CLIENT_ID:422567263716-9j7coeuir10hurql2akp21c3dpmtki0q.apps.googleusercontent.com}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    allowed-admin-emails: ${ADMIN_GOOGLE_EMAILS:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
  frontend-url: ${APP_FRONTEND_URL:https://teddypet.id.vn}
  admin-url: ${APP_ADMIN_URL:${APP_FRONTEND_URL:https://teddypet.id.vn}}
  password-reset:
    token-expiration-minutes: ${APP_PASSWORD_RESET_TOKEN_EXPIRATION:15}
  slot:
    duration-minutes: ${APP_SLOT_DURATION_MINUTES:30}
    generate-days-ahead: ${APP_SLOT_GENERATE_DAYS_AHEAD:60}
  hotline: ${APP_HOTLINE:096 768 13 28}

