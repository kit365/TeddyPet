<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title th:text="'Hóa đơn #' + ${order.orderCode}">Hóa đơn</title>
    <style>
        body {
            font-family: "Arial Unicode MS" !important;
            margin: 0;
            padding: 0;
            background-color: #f1f5f9;
            color: #334155;
            font-size: 14px;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        table {
            page-break-inside: auto;
        }

        tr {
            page-break-inside: avoid;
            page-break-after: auto;
        }

        thead {
            display: table-header-group;
        }

        tfoot {
            display: table-footer-group;
        }
    </style>
</head>

<body>
    <div class="container" style="background-color: #ffffff; padding: 0; border: 1px solid #e2e8f0; overflow: hidden;">
        <!-- Header -->
        <div th:replace="~{email/fragments/header :: header}"></div>

        <!-- Order Header Info -->
        <div style="padding: 30px 40px; text-align: center; border-bottom: 1px solid #f1f5f9;">
            <h1 style="color: #1e293b; font-size: 28px; margin-bottom: 5px; font-weight: 800;">HÓA ĐƠN BÁN HÀNG</h1>
            <p style="color: #64748b; font-size: 14px;">Cảm ơn bạn đã tin tưởng TeddyPet!</p>
        </div>

        <!-- Customer Info Grid Reused from Emails -->
        <div th:replace="~{email/fragments/components :: customerInfoGrid(
            fullName=${order.shippingName},
            phoneNumber=${order.shippingPhone},
            address=${order.shippingAddress},
            customerName=${order.user != null ? order.user.firstName + ' ' + order.user.lastName : order.shippingName},
            customerEmail=${order.user != null ? order.user.email : (order.guestEmail != null ? order.guestEmail : 'guest@example.com')},
            shippingMethod='Giao hàng tận nơi',
            paymentMethod=${order.payments != null and !order.payments.isEmpty() ? order.payments[0].paymentMethod : 'COD'}
        )}"></div>

        <!-- Order Items Section -->
        <div style="padding: 0 40px 30px;">
            <div
                style="font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 15px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">
                Chi tiết sản phẩm
            </div>
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background-color: #f8fafc;">
                        <th
                            style="text-align: left; padding: 12px; font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: 800;">
                            Sản phẩm</th>
                        <th
                            style="text-align: right; padding: 12px; font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: 800;">
                            Đơn giá</th>
                        <th
                            style="text-align: center; padding: 12px; font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: 800;">
                            SL</th>
                        <th
                            style="text-align: right; padding: 12px; font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: 800;">
                            Thành tiền</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${order.orderItems}" style="border-bottom: 1px solid #f1f5f9;">
                        <td style="padding: 15px 12px;">
                            <div style="font-weight: 700; color: #334155; font-size: 15px;"
                                th:text="${item.productName}">Sản phẩm</div>
                            <div style="font-size: 12px; color: #94a3b8; margin-top: 2px;"
                                th:text="${item.variantName}">Biến thể</div>
                        </td>
                        <td style="text-align: right; padding: 15px 12px; color: #334155; font-size: 14px;"
                            th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</td>
                        <td style="text-align: center; padding: 15px 12px; color: #334155; font-size: 14px;"
                            th:text="${item.quantity}">1</td>
                        <td style="text-align: right; padding: 15px 12px; font-weight: 700; color: #1e293b; font-size: 15px;"
                            th:text="${#numbers.formatDecimal(item.totalPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Financial Summary -->
        <div style="padding: 0 40px 40px;">
            <table style="width: 100%; border-top: 2px solid #f1f5f9; padding-top: 20px;">
                <tr>
                    <td style="width: 40%;"></td>
                    <td>
                        <table style="width: 100%; border-spacing: 0;">
                            <tr>
                                <td style="padding: 8px 0; font-size: 14px; color: #64748b; font-weight: 600;">Tạm tính:
                                </td>
                                <td style="text-align: right; padding: 8px 0; font-size: 16px; font-weight: 600; color: #0f172a; white-space: nowrap;"
                                    th:text="${#numbers.formatDecimal(order.subtotal, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ
                                </td>
                            </tr>
                            <tr>
                                <td style="padding: 8px 0; font-size: 14px; color: #64748b; font-weight: 600;">Phí vận
                                    chuyển:</td>
                                <td style="text-align: right; padding: 8px 0; font-size: 16px; font-weight: 600; color: #0f172a; white-space: nowrap;"
                                    th:text="${#numbers.formatDecimal(order.shippingFee, 0, 'COMMA', 0, 'POINT')} + 'đ'">
                                    0đ</td>
                            </tr>
                            <tr>
                                <td style="padding: 8px 0; font-size: 14px; color: #64748b; font-weight: 600;">Giảm giá:
                                </td>
                                <td style="text-align: right; padding: 8px 0; font-size: 16px; font-weight: 600; color: #f43f5e; white-space: nowrap;"
                                    th:text="'-' + ${#numbers.formatDecimal(order.discountAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'">
                                    -0đ</td>
                            </tr>
                            <tr>
                                <td
                                    style="padding: 15px 0; border-top: 1px solid #e2e8f0; font-size: 18px; font-weight: 800; color: #0f172a;">
                                    TỔNG THANH TOÁN:</td>
                                <td style="text-align: right; padding: 15px 0; border-top: 1px solid #e2e8f0; font-size: 22px; font-weight: 900; color: #4f46e5; white-space: nowrap;"
                                    th:text="${#numbers.formatDecimal(order.finalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'">
                                    0đ</td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </div>

        <!-- Footer -->
        <div th:replace="~{email/fragments/footer :: footer}"></div>
    </div>
</body>

</html>
