<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{email/fragments/head :: head(title='Cấp lại mật khẩu nhân viên')}">
    <title>Cấp lại mật khẩu nhân viên</title>
</head>

<body style="margin: 0; padding: 0; background-color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #334155; font-size: 16px; line-height: 1.6;" bgcolor="#f1f5f9">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f1f5f9;" bgcolor="#f1f5f9">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); max-width: 600px; width: 100%;" bgcolor="#ffffff">
                    <tr>
                        <td style="background-color: #ffffff; border-radius: 16px 16px 0 0;">
                            <div th:replace="~{email/fragments/header :: header}"></div>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 10px 40px 40px; background-color: #ffffff; text-align: center;">
                            <h2 style="color: #4f46e5; font-size: 24px; margin: 0 0 16px 0;">Yêu cầu cấp lại mật khẩu nhân viên</h2>
                            <p style="color: #64748b; margin: 0 0 20px 0; text-align: left;">Xin chào <span th:text="${adminGreetingName}">Admin</span>,</p>
                            <p style="color: #334155; margin: 0 0 12px 0; text-align: left;">Có nhân viên vừa gửi yêu cầu cấp lại mật khẩu qua trang đăng nhập quản trị.</p>
                            <div style="background: #f8fafc; border-radius: 12px; padding: 16px; margin: 20px 0; text-align: left;">
                                <p style="margin: 0 0 8px 0;"><strong>Email:</strong> <span th:text="${staffEmail}">email</span></p>
                                <p style="margin: 0;"><strong>Họ tên hiển thị:</strong> <span th:text="${staffDisplayName}">Tên</span></p>
                            </div>
                            <div style="margin: 28px 0;"
                                 th:replace="~{email/fragments/components :: button(text='Xác nhận xử lý', url=${actionUrl})}"></div>
                            <p style="color: #94a3b8; font-size: 13px; margin-top: 24px; text-align: left;">Liên kết có hiệu lực giới hạn. Vui lòng đăng nhập quản trị trước khi mở nếu được yêu cầu.</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="background-color: #ffffff; border-radius: 0 0 16px 16px;">
                            <div th:replace="~{email/fragments/footer :: footer}"></div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
