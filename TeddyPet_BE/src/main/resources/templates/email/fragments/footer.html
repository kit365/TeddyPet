<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Email Footer</title>
</head>

<body>
    <div th:fragment="footer">
        <table style="width: 100%; border-spacing: 0; border-collapse: collapse; background-color: #ffffff;">
            <!-- Support Info -->
            <tr>
                <td style="padding: 40px 40px 15px; text-align: center; background-color: #ffffff;">
                    <p style="font-size: 15px; color: #64748b; margin: 0 0 20px 0; font-weight: 500; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                        Bạn có câu hỏi? Liên hệ với chúng tôi qua các kênh hỗ trợ:
                    </p>
                </td>
            </tr>
            <tr>
                <td style="text-align: center; padding: 0 40px 15px; background-color: #ffffff;">
                    <table style="display: inline-table; border-spacing: 10px; border-collapse: separate;">
                        <tr>
                            <td style="background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 0;">
                                <a th:href="${facebookUrl}"
                                    style="display: block; padding: 12px 24px; color: #1e293b; text-decoration: none; font-size: 14px; font-weight: 700; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; white-space: nowrap;">
                                    <span style="color: #1877f2; font-size: 18px; font-weight: 900; margin-right: 5px;">f</span>
                                    Facebook
                                </a>
                            </td>
                            <td style="background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 0;">
                                <a th:href="${instagramUrl}"
                                    style="display: block; padding: 12px 24px; color: #1e293b; text-decoration: none; font-size: 14px; font-weight: 700; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; white-space: nowrap;">
                                    <img src="https://img.icons8.com/color/48/instagram-new.png" alt="IG"
                                        style="width: 18px; height: 18px; vertical-align: middle; margin-right: 8px;" />
                                    Instagram
                                </a>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr th:if="${hotline}">
                <td style="text-align: center; padding: 10px 40px 20px; background-color: #ffffff;">
                    <p style="font-size: 14px; color: #94a3b8; margin: 0; font-weight: 600; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                        Hotline: <span th:text="${hotline}" style="color: #4f46e5;">096 768 13 28</span>
                    </p>
                </td>
            </tr>

            <!-- Trademark -->
            <tr>
                <td style="text-align: center; padding: 25px 40px; border-top: 1px solid #e2e8f0; background-color: #ffffff;">
                    <p style="font-size: 11px; color: #94a3b8; margin: 0; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                        © 2026 <span th:text="${appName}" style="color: #94a3b8;">TeddyPet</span>. All rights reserved.
                    </p>
                    <p style="font-size: 10px; color: #cbd5e1; margin: 10px 0 0 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                        Đây là email tự động, vui lòng không phản hồi trực tiếp vào địa chỉ này.
                    </p>
                </td>
            </tr>
        </table>
    </div>
</body>

</html>
