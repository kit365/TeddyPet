<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Email Header</title>
</head>

<body>
    <div th:fragment="header">
        <!-- Centered Logo for Auth/OTP emails -->
        <table th:if="${orderCode == null}"
            style="width: 100%; border-spacing: 0; border-collapse: collapse;">
            <tr>
                <td style="text-align: center; padding: 30px 20px 20px; background-color: #ffffff;">
                    <img src="https://i.imgur.com/V2kwkkK.png" alt="TeddyPet Logo"
                        style="width: 170px; display: inline-block; background-color: #ffffff; padding: 8px; border-radius: 12px;" />
                </td>
            </tr>
        </table>

        <!-- Top Bar for Order emails -->
        <table th:if="${orderCode != null}"
            style="width: 100%; padding: 0; border-spacing: 0; border-collapse: collapse; background-color: #ffffff; border-bottom: 1px solid #e2e8f0;">
            <tr>
                <td style="text-align: left; padding: 25px 40px;">
                    <a th:href="${webUrl != null ? webUrl : '#'}" style="text-decoration: none;">
                        <img src="https://i.imgur.com/V2kwkkK.png" alt="TeddyPet Logo"
                            style="width: 140px; display: block; background-color: #ffffff; padding: 4px; border-radius: 8px;" />
                    </a>
                </td>
                <td style="text-align: right; padding: 25px 40px; font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                    ĐƠN HÀNG #<span th:text="${orderCode}" style="color: #94a3b8;">ORD-000000</span><br />
                    <span style="font-weight: 500; text-transform: none; letter-spacing: 0; color: #94a3b8;">Ngày đặt: <span
                            th:text="${orderDate}" style="color: #94a3b8;">01/01/2026</span></span>
                </td>
            </tr>
        </table>
    </div>
</body>

</html>
