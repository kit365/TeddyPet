<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">TeddyPet</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
            color: #334155;
        }

        .container {
            max-width: 600px;
            margin: 30px auto;
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.06);
        }

        .warning-box {
            background: #fff9f0;
            border-left: 4px solid #f59e0b;
            padding: 20px;
            margin: 25px 0;
            border-radius: 4px 12px 12px 4px;
            font-size: 14px;
            color: #92400e;
        }

        .link-box {
            font-size: 12px;
            word-break: break-all;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            color: #475569;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            border: 1px solid #e2e8f0;
        }

        .highlight {
            color: #4A90A4;
            font-weight: bold;
        }

        .text-primary {
            color: #4A90A4;
        }

        .text-center {
            text-align: center;
        }

        .mb-30 {
            margin-bottom: 30px;
        }
    </style>
</head>

<body>
</body>

</html>
