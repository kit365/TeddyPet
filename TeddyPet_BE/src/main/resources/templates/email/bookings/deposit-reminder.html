<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{email/fragments/head :: head(title='Nhắc nhở thanh toán cọc')}">
    <title>Nhắc nhở thanh toán cọc</title>
</head>

<body style="margin: 0; padding: 0; background-color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #334155; font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased;" bgcolor="#f1f5f9">
    <table class="email-outer" role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f1f5f9;" bgcolor="#f1f5f9">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table class="email-card" role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); max-width: 600px; width: 100%;" bgcolor="#ffffff">
                    <tr>
                        <td style="background-color: #ffffff; border-radius: 16px 16px 0 0;">
                            <div th:replace="~{email/fragments/header :: header}"></div>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 10px 40px 40px; background-color: #ffffff; line-height: 1.6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #334155;">
                            <h2 style="color: #ff9800; font-size: 24px; margin: 0 0 20px 0; padding-bottom: 10px; border-bottom: 2px solid #ff9800; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">[NHẮC NHỞ] Yêu cầu thanh toán cọc</h2>
                            <p style="color: #334155; margin: 0 0 15px 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">Xin chào,</p>
                            <p style="color: #334155; margin: 0 0 15px 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">Đơn đặt lịch của bạn với mã <strong style="color: #334155;" th:text="${bookingCode}"></strong> tại <strong style="color: #4f46e5;" th:text="${appName}">TeddyPet</strong> hiện vẫn chưa được thanh toán cọc.</p>
                            <p style="color: #d32f2f; margin: 0 0 15px 0; font-weight: bold; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">Đơn đặt lịch của bạn sắp hết hạn giữ chỗ. Vui lòng thanh toán cọc ngay để đảm bảo lịch hẹn.</p>

                            <div style="text-align: center; margin: 30px 0;">
                                <a th:href="${paymentUrl}" style="display: inline-block; padding: 16px 36px; background-color: #ff9800; color: #ffffff; text-decoration: none; border-radius: 12px; font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                                    <span style="color: #ffffff;">Thanh toán cọc ngay</span>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td style="background-color: #ffffff; border-radius: 0 0 16px 16px;">
                            <div th:replace="~{email/fragments/footer :: footer}"></div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
