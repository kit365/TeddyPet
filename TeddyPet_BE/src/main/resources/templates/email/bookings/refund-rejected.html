<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{email/fragments/head :: head(title='Yêu cầu hoàn cọc đã bị từ chối')}">
    <title>Yêu cầu hoàn cọc đã bị từ chối</title>
</head>

<body style="margin: 0; padding: 0; background-color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #334155; font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased;" bgcolor="#f1f5f9">
    <table class="email-outer" role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f1f5f9;" bgcolor="#f1f5f9">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table class="email-card" role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); max-width: 600px; width: 100%;" bgcolor="#ffffff">
                    <tr>
                        <td style="background-color: #ffffff; border-radius: 16px 16px 0 0;">
                            <div th:replace="~{email/fragments/header :: header}"></div>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 10px 40px 40px; background-color: #ffffff; line-height: 1.6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #334155;">
                            <h2 style="color: #dc2626; font-size: 24px; margin: 0 0 20px 0; padding-bottom: 10px; border-bottom: 2px solid #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">Yêu cầu hoàn cọc đã bị từ chối</h2>
                            <p style="color: #334155; margin: 0 0 15px 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">Xin chào,</p>
                            <p style="color: #334155; margin: 0 0 15px 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">Yêu cầu hoàn tiền cọc cho đơn <strong style="color: #334155;" th:text="${bookingCode}"></strong> tại <strong style="color: #4f46e5;" th:text="${appName}">TeddyPet</strong> đã không được chấp nhận. Đơn đặt lịch của bạn vẫn được giữ theo trạng thái hiện tại trên hệ thống.</p>

                            <div th:if="${adminResponse != null and !#strings.isEmpty(adminResponse)}" style="background-color: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 16px; margin: 20px 0;">
                                <p style="margin: 0 0 8px; font-size: 13px; color: #991b1b; font-weight: 600; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">Phản hồi từ TeddyPet</p>
                                <p style="margin: 0; color: #334155; white-space: pre-wrap; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;" th:text="${adminResponse}"></p>
                            </div>

                            <p style="color: #334155; margin: 0 0 15px 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">Nếu bạn có thắc mắc, vui lòng liên hệ hotline để được hỗ trợ.</p>

                            <div style="text-align: center; margin: 30px 0;">
                                <a th:href="${detailUrl}" style="display: inline-block; padding: 16px 36px; background-color: #64748b; color: #ffffff; text-decoration: none; border-radius: 12px; font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                                    <span style="color: #ffffff;">Xem chi tiết đơn đặt lịch</span>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td style="background-color: #ffffff; border-radius: 0 0 16px 16px;">
                            <div th:replace="~{email/fragments/footer :: footer}"></div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
