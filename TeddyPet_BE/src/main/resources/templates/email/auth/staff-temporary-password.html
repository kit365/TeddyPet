<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{email/fragments/head :: head(title='Mật khẩu tạm')}">
    <title>Mật khẩu tạm</title>
</head>

<body style="margin: 0; padding: 0; background-color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #334155; font-size: 16px; line-height: 1.6;" bgcolor="#f1f5f9">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f1f5f9;" bgcolor="#f1f5f9">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-radius: 16px; max-width: 600px; width: 100%;" bgcolor="#ffffff">
                    <tr>
                        <td style="border-radius: 16px 16px 0 0;">
                            <div th:replace="~{email/fragments/header :: header}"></div>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 10px 40px 40px; text-align: center;">
                            <h2 style="color: #0f172a; font-size: 24px; margin: 0 0 16px 0;">Mật khẩu tạm của bạn</h2>
                            <p style="color: #334155; text-align: left; margin: 0 0 16px 0;">Quản trị viên đã phê duyệt cấp lại mật khẩu. Dùng mật khẩu dưới đây để đăng nhập <strong>một lần</strong>, sau đó hệ thống sẽ yêu cầu bạn đặt mật khẩu mới.</p>
                            <div style="background: #1e293b; color: #f8fafc; font-family: monospace; font-size: 18px; letter-spacing: 0.05em; padding: 16px 24px; border-radius: 12px; margin: 24px 0; word-break: break-all;" th:text="${tempPassword}">password</div>
                            <div style="margin: 28px 0;"
                                 th:replace="~{email/fragments/components :: button(text='Đăng nhập quản trị', url=${loginUrl})}"></div>
                            <div style="background-color: #fef2f2; border-left: 4px solid #ef4444; padding: 16px; margin-top: 24px; text-align: left; border-radius: 8px;">
                                <p style="margin: 0; color: #7f1d1d; font-size: 14px;"><strong>Không chia sẻ</strong> mật khẩu này. Nếu bạn không yêu cầu, hãy báo quản trị viên ngay.</p>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td style="border-radius: 0 0 16px 16px;">
                            <div th:replace="~{email/fragments/footer :: footer}"></div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
